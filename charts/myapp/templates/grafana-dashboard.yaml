{{- if .Values.serviceMonitor.enabled -}}
# Picked up automatically by the Grafana sidecar (label grafana_dashboard=1).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "myapp.fullname" . }}-dashboard
  labels:
    grafana_dashboard: "1"
    {{- include "myapp.labels" . | nindent 4 }}
data:
  myapp-dashboard.json: |-
    {{- .Files.Get "dashboards/myapp-dashboard.json" | nindent 4 }}
{{- end }}
