name: iac-scan

# Static security scan of infrastructure code: Helm templates, k8s manifests
# and Terraform are checked for misconfigurations (privileged pods, missing
# resource limits, open security groups, etc.).

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "argocd/**"
      - "terraform/**"
      - ".github/workflows/iac-scan.yaml"
  pull_request:
    branches: [main]

jobs:
  trivy-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy IaC misconfiguration scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # report-only for now; flip to "1" to enforce

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
