name: ci

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "charts/**"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ghcr.io/<owner>/<repo>

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: app
        run: |
          pip install -r requirements.txt pytest httpx
      - name: Run tests
        working-directory: app
        run: pytest -q

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint charts/myapp
      - name: Template chart (render sanity check)
        run: helm template myapp charts/myapp --set image.tag=ci > /dev/null

  build-scan-push:
    needs: [test, helm-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # upload Trivy SARIF to the Security tab
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"          # fail the pipeline on fixable CRITICAL/HIGH CVEs

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  bump-manifest:
    # GitOps: commit the new image tag back to the repo so ArgoCD deploys it.
    needs: build-scan-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump image tag in chart values
        env:
          NEW_TAG: ${{ needs.build-scan-push.outputs.sha }}
        run: |
          sed -i -E "s/^(\s*tag:\s*).*/\1\"${NEW_TAG}\"/" charts/myapp/values.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No tag change."
          else
            git commit -am "ci: deploy image ${NEW_TAG} [skip ci]"
            git push
          fi
