# Values for the kube-prometheus-stack Helm chart (installed as release "monitoring").
# Tuned to run comfortably inside a local k3d cluster.

fullnameOverride: monitoring

# Scrape ANY ServiceMonitor/PodMonitor in the cluster, not only those whose
# `release` label matches. Makes the app's ServiceMonitor discoverable.
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    retention: 6h
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 600Mi

grafana:
  adminPassword: admin            # demo only — change for any real use
  defaultDashboardsTimezone: browser
  # Auto-load dashboards from ConfigMaps labelled grafana_dashboard=1.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

# Trim components that are noisy/unnecessary on a single-node local cluster.
alertmanager:
  enabled: true
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
