# Deploys kube-prometheus-stack from the upstream Helm repo, with our values
# pulled from THIS git repo via a multi-source `$values` reference.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.2.0
      helm:
        releaseName: monitoring
        valueFiles:
          - $values/monitoring/values.yaml
    - repoURL: https://github.com/filooww/k8s-gitops-platform
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # CRDs in this chart are large; SSA avoids annotation limits
